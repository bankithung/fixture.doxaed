{% if page_obj and page_obj.paginator.num_pages > 1 %}
<nav class="mt-3 text-sm flex items-center gap-2">
  {% if page_obj.has_previous %}
    <a class="px-2 py-1 border border-slate-200 rounded" href="?page={{ page_obj.previous_page_number }}">Prev</a>
  {% endif %}
  <span class="text-slate-500">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>
  {% if page_obj.has_next %}
    <a class="px-2 py-1 border border-slate-200 rounded" href="?page={{ page_obj.next_page_number }}">Next</a>
  {% endif %}
</nav>
{% endif %}
