{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Super-admin sign in · Fixture Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-900 antialiased min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm bg-white rounded-lg shadow-sm border border-slate-200 p-6">
    <div class="mb-6">
      <h1 class="text-xl font-semibold">Super-admin</h1>
      <p class="text-sm text-slate-500 mt-1">Fixture Platform · platform-level console</p>
    </div>

    {% if error %}
      <div role="alert" class="mb-4 rounded border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-800">
        {{ error }}
      </div>
    {% endif %}

    <form method="post" novalidate class="space-y-4">
      {% csrf_token %}
      <div>
        <label for="email" class="block text-sm font-medium text-slate-700">Email</label>
        <input
          id="email" name="email" type="email" autocomplete="username" required autofocus
          class="mt-1 block w-full rounded border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-500"
        >
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
        <input
          id="password" name="password" type="password" autocomplete="current-password" required
          class="mt-1 block w-full rounded border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-500"
        >
      </div>
      <button
        type="submit"
        class="w-full rounded bg-slate-900 px-3 py-2 text-sm font-medium text-white hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-500"
      >
        Sign in
      </button>
    </form>

    <p class="mt-4 text-xs text-slate-500">
      Restricted to platform Super-admins. Non-Super-admin sign-in is via the user app.
    </p>
  </div>
</body>
</html>
