  /api/audit/orgs/{slug}/:
    get:
      operationId: audit_orgs_retrieve
      description: Cursor-paginated, org-scoped audit event feed. Read-only. Module-gated
        by `org.audit_log`.
      parameters:
      - in: query
        name: actor_id
        schema:
          type: string
          format: uuid
      - in: query
        name: cursor
        schema:
          type: string
      - in: query
        name: event_type
        schema:
          type: string
      - in: query
        name: from
        schema:
          type: string
          format: date-time
      - in: query
        name: limit
        schema:
          type: integer
      - in: path
        name: slug
        schema:
          type: string
        required: true
      - in: query
        name: to
        schema:
          type: string
          format: date-time
      tags:
      - audit
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEventListResponse'
          description: ''
  /api/disputes/{dispute_id}/reject/:
