          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EffectiveModules'
          description: ''
  /api/permissions/orgs/{slug}/users/{user_uuid}/grants/:
    get:
      operationId: permissions_orgs_users_grants_list_2
      description: Slug-routed alias for GET /grants/ — same response shape.
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      - in: path
        name: user_uuid
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - permissions
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GrantRow'
          description: ''
    put:
      operationId: permissions_orgs_users_grants_update_2
      description: 'Slug-routed alias for PUT /grants/. Accepts EITHER the `{grants:
        [{module, state}], reason}` shape or the SPA matrix `{cells: {module: state},
        reason, event_id?}` shape.'
      parameters:
      - in: path
        name: slug
        schema:
          type: string
        required: true
      - in: path
        name: user_uuid
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - permissions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkGrants'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BulkGrants'
