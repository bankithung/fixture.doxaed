components:
  schemas:
    AcceptInvitation:
      type: object
      properties:
        token:
          type: string
          maxLength: 128
        password:
          type: string
          writeOnly: true
          minLength: 12
        name:
          type: string
          maxLength: 200
      required:
      - token
    AdminInvitation:
      type: object
      description: |-
        Read-side serializer. Surfaces effective_status (computed) which
        flips pending→expired when expires_at is in the past, even if the
        DB row hasn't been swept yet (we don't run a cron — read-time
        materialization).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        organization:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/AdminInvitationStatusEnum'
          readOnly: true
        effective_status:
          type: string
          readOnly: true
        expires_at:
          type: string
          format: date-time
          readOnly: true
        accepted_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        revoked_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        invited_by:
          type: string
          format: uuid
          readOnly: true
          nullable: true
      required:
      - accepted_at
      - created_at
      - effective_status
      - email
      - expires_at
      - id
      - invited_by
      - organization
      - revoked_at
      - role
      - status
    AdminInvitationCreate:
      type: object
      description: |-
        Body shape accepted by both the UUID-routed and slug-routed
        invitation-create endpoints.

        Either ``role`` (single string, legacy) or ``roles`` (list, sent by
        the SPA) may be given. ``event_id`` is the optional idempotency key
        (UUID).
      properties:
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/RoleEnum'
        roles:
          type: array
          items:
            $ref: '#/components/schemas/RolesEnum'
        event_id:
          type: string
          format: uuid
      required:
      - email
    AdminInvitationStatusEnum:
      enum:
      - pending
      - accepted
      - expired
      - revoked
      - declined
      type: string
      description: |-
        * `pending` - Pending
        * `accepted` - Accepted
        * `expired` - Expired
        * `revoked` - Revoked
        * `declined` - Declined
    Archive:
      type: object
      properties:
        reason:
          type: string
          maxLength: 500
      required:
      - reason
    AuditEvent:
      type: object
      description: |-
        Read-only serializer for AuditEvent rows.

        Includes a denormalized ``actor_email_at_time`` (the actor user's
        current email — there is no historical snapshot in v1A; B.5 lists
        ``deleted_user_handle`` as the post-deletion fallback). ``payload``
        is the merged ``payload_after`` (creation-style events) or
        ``payload_before`` -> ``payload_after`` diff for mutating events.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        event_type:
          type: string
          readOnly: true
        actor_id:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        actor_email_at_time:
          type: string
          nullable: true
          readOnly: true
        target_id:
          type: string
          format: uuid
          readOnly: true
        target_type:
          type: string
          readOnly: true
        target_label:
          type: string
          nullable: true
          readOnly: true
        payload:
          type: object
          additionalProperties: {}
          nullable: true
          readOnly: true
        reason:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - actor_email_at_time
      - actor_id
      - created_at
      - event_type
      - id
      - payload
      - reason
      - target_id
      - target_label
      - target_type
    AuditEventListResponse:
      type: object
      description: Cursor-paginated response shape for the audit list endpoint.
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/AuditEvent'
        next_cursor:
          type: string
          nullable: true
        previous_cursor:
          type: string
          nullable: true
      required:
      - results
    BulkGrants:
      type: object
      description: PUT body for /grants/ — replace all grants atomically.
      properties:
        grants:
          type: array
          items:
            $ref: '#/components/schemas/GrantInput'
        reason:
          type: string
          maxLength: 2000
          minLength: 20
      required:
      - grants
      - reason
    ChangeSlug:
      type: object
      properties:
        new_slug:
          type: string
          maxLength: 63
      required:
      - new_slug
    EffectiveModules:
      type: object
      description: Response shape for GET /me/modules/.
      properties:
        modules:
          type: array
          items:
            type: string
      required:
      - modules
    FeedbackSubmit:
      type: object
      description: |-
        Request body for ``POST /api/feedback/submit/``.

        Frontend wires the feedback widget (v1Users.md A.2
        ``personal.feedback_widget``) to this endpoint. Body is PII-redacted
        at the service layer (B.11) so screenshots / page URLs that may
        contain emails or recovery codes are stripped before INSERT.

        ``event_id`` is an optional client-supplied UUID for idempotency
        (PRD invariant 3). When supplied, re-submitting the same id
        returns the existing row (200 instead of 201).
      properties:
        message:
          type: string
          maxLength: 5000
          minLength: 1
        page_url:
          type: string
          maxLength: 2048
        screenshot_data_uri:
          type: string
          maxLength: 5000000
        category:
          allOf:
          - $ref: '#/components/schemas/FeedbackSubmitCategoryEnum'
          default: other
        subject:
          type: string
          maxLength: 200
        event_id:
          type: string
          format: uuid
      required:
      - message
    FeedbackSubmitCategoryEnum:
      enum:
      - bug
      - feature_request
      - complaint
      - praise
      - other
      type: string
      description: |-
        * `bug` - Bug
        * `feature_request` - Feature request
        * `complaint` - Complaint
        * `praise` - Praise
        * `other` - Other
    FeedbackSubmitResponse:
      type: object
      description: Response body for the public submit endpoint.
      properties:
        id:
          type: string
          format: uuid
      required:
      - id
    GrantInput:
      type: object
      description: Single (module, state) pair used inside the bulk grants PUT body.
      properties:
        module:
          type: string
          maxLength: 64
        state:
          $ref: '#/components/schemas/StateEnum'
      required:
      - module
      - state
    GrantRow:
      type: object
      description: A single MembershipModuleGrant row, with module code denormalized.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        module_code:
          type: string
          readOnly: true
        state:
          allOf:
          - $ref: '#/components/schemas/StateEnum'
          readOnly: true
        reason:
          type: string
          readOnly: true
        granted_by:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - granted_by
      - id
      - module_code
      - reason
      - state
      - updated_at
    InstitutionIn:
      type: object
      description: Admin direct-add / edit of an Institution (Stage-1).
      properties:
        name:
          type: string
          maxLength: 200
        kind:
          allOf:
          - $ref: '#/components/schemas/KindEnum'
          default: school
        region:
          type: string
          maxLength: 120
        short_name:
          type: string
          maxLength: 40
        contact_name:
          type: string
          maxLength: 200
        contact_email:
          type: string
          format: email
        contact_phone:
          type: string
          maxLength: 32
      required:
      - name
    KindEnum:
      enum:
      - school
      - college
      - university
      - club
      - academy
      - other
      type: string
      description: |-
        * `school` - school
        * `college` - college
        * `university` - university
        * `club` - club
        * `academy` - academy
        * `other` - other
    Login:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
        totp_code:
          type: string
      required:
      - email
      - password
    MatrixMember:
      type: object
      description: One member row in the matrix `members` array.
      properties:
        user_id:
          type: string
        user_email:
          type: string
        user_full_name:
          type: string
        roles:
          type: array
          items:
            type: string
        cells:
          type: object
          additionalProperties:
            type: string
        role_defaults:
          type: object
          additionalProperties:
            type: boolean
      required:
      - cells
      - role_defaults
      - roles
      - user_email
      - user_full_name
      - user_id
    MatrixModule:
      type: object
      description: One module row in the matrix `modules` array.
      properties:
        key:
          type: string
        scope:
          type: string
        label:
          type: string
        description:
          type: string
      required:
      - description
      - key
      - label
      - scope
    MatrixResponse:
      type: object
      description: Top-level response shape for the matrix endpoint.
      properties:
        modules:
          type: array
          items:
            $ref: '#/components/schemas/MatrixModule'
        members:
          type: array
          items:
            $ref: '#/components/schemas/MatrixMember'
      required:
      - members
      - modules
    Me:
      type: object
      description: |-
        Used by GET/PATCH /api/accounts/me/.

        Read shape includes `is_superuser`, `memberships[]`, and
        `last_active_org_slug` so the SPA can route directly to a dashboard
        without a second round-trip to /api/orgs/.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
          title: Email address
        name:
          type: string
          title: Full name
          maxLength: 200
        is_superuser:
          type: boolean
          readOnly: true
        has_2fa_enrolled:
          type: boolean
          readOnly: true
        twofa_enrolled_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        email_verified_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        last_active_org_id:
          type: string
          format: uuid
          nullable: true
        last_active_org_slug:
          type: string
          nullable: true
          readOnly: true
        memberships:
          type: array
          items:
            $ref: '#/components/schemas/MembershipSummary'
          readOnly: true
        deleted_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - deleted_at
      - email
      - email_verified_at
      - has_2fa_enrolled
      - id
      - is_superuser
      - last_active_org_slug
      - memberships
      - twofa_enrolled_at
    MembershipSummary:
      type: object
      description: |-
        One per-org membership row consumed by the SPA bootstrap.

        Aggregated across the user's (potentially multiple) role rows in
        the same org so the SPA can render one switcher entry per org and
        a roles-array for in-org role-view toggling (§2.7).
      properties:
        org_id:
          type: string
          format: uuid
        org_slug:
          type: string
        org_name:
          type: string
        roles:
          type: array
          items:
            type: string
        is_org_owner:
          type: boolean
        effective_modules:
          type: array
          items:
            type: string
      required:
      - effective_modules
      - is_org_owner
      - org_id
      - org_name
      - org_slug
      - roles
    Module:
      type: object
      description: Serializer for the module catalog (read-only, public-ish).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        code:
          type: string
          readOnly: true
        name:
          type: string
          readOnly: true
        description:
          type: string
          readOnly: true
        category:
          type: string
          readOnly: true
        default_for_roles:
          readOnly: true
      required:
      - category
      - code
      - default_for_roles
      - description
      - id
      - name
    OrgMemberDetail:
      type: object
      description: |-
        Shape returned by ``GET /api/orgs/{slug}/members/``.

        Pre-aggregated by the view: one entry per user with roles[] (distinct
        role strings from all that user's active membership rows in this
        org), the earliest joined_at, and OR(is_org_owner) across rows.
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        roles:
          type: array
          items:
            type: string
        is_org_owner:
          type: boolean
        joined_at:
          type: string
          format: date-time
        is_active:
          type: boolean
      required:
      - email
      - full_name
      - id
      - is_active
      - is_org_owner
      - joined_at
      - roles
      - user_id
    Organization:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        slug:
          type: string
          maxLength: 63
        name:
          type: string
          maxLength: 200
        status:
          allOf:
          - $ref: '#/components/schemas/OrganizationStatusEnum'
          readOnly: true
        time_zone:
          type: string
          maxLength: 64
        created_at:
          type: string
          format: date-time
          readOnly: true
        archived_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        suspended_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        suspended_reason:
          type: string
          readOnly: true
      required:
      - archived_at
      - created_at
      - id
      - name
      - slug
      - status
      - suspended_at
      - suspended_reason
    OrganizationCreate:
      type: object
      properties:
        slug:
          type: string
          maxLength: 63
        name:
          type: string
          maxLength: 200
        time_zone:
          type: string
          default: Asia/Kolkata
          maxLength: 64
      required:
      - name
      - slug
    OrganizationMembership:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user:
          type: string
          format: uuid
          readOnly: true
        organization:
          type: string
          format: uuid
          readOnly: true
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          readOnly: true
        is_org_owner:
          type: boolean
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
          default: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        removed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - created_at
      - id
      - is_active
      - is_org_owner
      - organization
      - removed_at
      - role
      - user
    OrganizationStatusEnum:
      enum:
      - pending_review
      - active
      - suspended
      - archived
      - orphaned
      type: string
      description: |-
        * `pending_review` - Pending review
        * `active` - Active
        * `suspended` - Suspended
        * `archived` - Archived
        * `orphaned` - Orphaned
    PasswordResetComplete:
      type: object
      properties:
        token:
          type: string
        new_password:
          type: string
          writeOnly: true
          minLength: 12
      required:
      - new_password
      - token
    PasswordResetRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
      - email
    PatchedInstitutionIn:
      type: object
      description: Admin direct-add / edit of an Institution (Stage-1).
      properties:
        name:
          type: string
          maxLength: 200
        kind:
          allOf:
          - $ref: '#/components/schemas/KindEnum'
          default: school
        region:
          type: string
          maxLength: 120
        short_name:
          type: string
          maxLength: 40
        contact_name:
          type: string
          maxLength: 200
        contact_email:
          type: string
          format: email
        contact_phone:
          type: string
          maxLength: 32
    PatchedMe:
      type: object
      description: |-
        Used by GET/PATCH /api/accounts/me/.

        Read shape includes `is_superuser`, `memberships[]`, and
        `last_active_org_slug` so the SPA can route directly to a dashboard
        without a second round-trip to /api/orgs/.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
          title: Email address
        name:
          type: string
          title: Full name
          maxLength: 200
        is_superuser:
          type: boolean
          readOnly: true
        has_2fa_enrolled:
          type: boolean
          readOnly: true
        twofa_enrolled_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        email_verified_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        last_active_org_id:
          type: string
          format: uuid
          nullable: true
        last_active_org_slug:
          type: string
          nullable: true
          readOnly: true
        memberships:
          type: array
          items:
            $ref: '#/components/schemas/MembershipSummary'
          readOnly: true
        deleted_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
    PatchedOrganizationUpdate:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        time_zone:
          type: string
          maxLength: 64
    PatchedTournamentMembershipUpdate:
      type: object
      description: PATCH body for member management — role and/or status, both optional.
      properties:
        role:
          $ref: '#/components/schemas/RoleEnum'
        status:
          $ref: '#/components/schemas/StatusC3bEnum'
    PlayerIn:
      type: object
      properties:
        full_name:
          type: string
          maxLength: 200
        jersey_no:
          type: integer
          maximum: 999
          minimum: 1
        position:
          type: string
          maxLength: 16
        dob_year:
          type: integer
          maximum: 2025
          minimum: 1950
        is_goalkeeper:
          type: boolean
          default: false
        captain:
          type: boolean
          default: false
      required:
      - full_name
    Reauth:
      type: object
      properties:
        password:
          type: string
          writeOnly: true
      required:
      - password
    RevokeInvitation:
      type: object
      properties:
        reason:
          type: string
          maxLength: 500
    RoleEnum:
      enum:
      - admin
      - co_organizer
      - game_coordinator
      - match_scorer
      - referee
      - team_manager
      type: string
      description: |-
        * `admin` - Admin
        * `co_organizer` - Co-organizer
        * `game_coordinator` - Game coordinator
        * `match_scorer` - Match scorer
        * `referee` - Referee
        * `team_manager` - Team manager
    RolesEnum:
      enum:
      - admin
      - co_organizer
      - game_coordinator
      - match_scorer
      - referee
      - team_manager
      type: string
      description: |-
        * `admin` - Admin
        * `co_organizer` - Co-organizer
        * `game_coordinator` - Game coordinator
        * `match_scorer` - Match scorer
        * `referee` - Referee
        * `team_manager` - Team manager
    SchoolRegistration:
      type: object
      description: Payload a school submits via the public registration link.
      properties:
        school_name:
          type: string
          maxLength: 200
        teams:
          type: array
          items:
            $ref: '#/components/schemas/TeamIn'
        event_id:
          type: string
          format: uuid
      required:
      - school_name
      - teams
    Signup:
      type: object
      description: |-
        Public self-signup payload (v1Users.md §2.3 Path B).

        The signup endpoint creates a User AND a pending-review Organization
        plus a pending Admin membership in a single atomic transaction. The
        optional ``org_name`` lets the user choose a display name for their
        new tenant; if omitted, it is derived from the email local-part.

        ``event_id`` (optional, client-generated UUID) is honored for
        idempotent retries per architectural invariant 3 — re-submitting the
        same ``event_id`` short-circuits and returns the existing record.
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
          minLength: 12
        name:
          type: string
          maxLength: 200
        org_name:
          type: string
          maxLength: 200
        event_id:
          type: string
          format: uuid
      required:
      - email
      - password
    SoftDelete:
      type: object
      properties:
        reason:
          type: string
    Sport:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        code:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        name:
          type: string
          readOnly: true
        category:
          allOf:
          - $ref: '#/components/schemas/SportCategoryEnum'
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/SportStatusEnum'
          readOnly: true
        description:
          type: string
          readOnly: true
        indigenous_to:
          type: string
          readOnly: true
        is_team_sport:
          type: boolean
          readOnly: true
        is_individual_sport:
          type: boolean
          readOnly: true
        icon:
          type: string
          readOnly: true
        display_order:
          type: integer
          readOnly: true
      required:
      - category
      - code
      - description
      - display_order
      - icon
      - id
      - indigenous_to
      - is_individual_sport
      - is_team_sport
      - name
      - status
    SportCategoryEnum:
      enum:
      - team
      - individual
      - racket
      - combat
      - athletics
      - aquatics
      - gymnastics
      - strength
      - shooting
      - mind
      - indigenous
      - adventure
      - other
      type: string
      description: |-
        * `team` - Team
        * `individual` - Individual
        * `racket` - Racket
        * `combat` - Combat / Martial arts
        * `athletics` - Athletics
        * `aquatics` - Aquatics
        * `gymnastics` - Gymnastics
        * `strength` - Strength sports
        * `shooting` - Shooting / Archery
        * `mind` - Mind sports
        * `indigenous` - Indigenous / Traditional
        * `adventure` - Adventure / Outdoor
        * `other` - Other
    SportStatusEnum:
      enum:
      - planned
      - coming_soon
      - active
      - deprecated
      type: string
      description: |-
        * `planned` - Planned
        * `coming_soon` - Coming soon
        * `active` - Active
        * `deprecated` - Deprecated
    StateEnum:
      enum:
      - default
      - grant
      - deny
      type: string
      description: |-
        * `default` - Default (no override)
        * `grant` - Grant (force on)
        * `deny` - Deny (force off)
    StatusC3bEnum:
      enum:
      - active
      - suspended
      - revoked
      type: string
      description: |-
        * `active` - Active
        * `suspended` - Suspended
        * `revoked` - Revoked
    Suspend:
      type: object
      properties:
        reason:
          type: string
          maxLength: 500
      required:
      - reason
    TeamIn:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        short_name:
          type: string
          maxLength: 40
        players:
          type: array
          items:
            $ref: '#/components/schemas/PlayerIn'
      required:
      - name
    TournamentCreate:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        sport_code:
          type: string
        event_id:
          type: string
          format: uuid
      required:
      - name
    TournamentInvitationCreate:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/RoleEnum'
        event_id:
          type: string
          format: uuid
      required:
      - email
      - role
    TournamentMembership:
      type: object
      description: 'Roster row: user identity + tournament-scoped role/status.'
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user_id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          readOnly: true
        full_name:
          type: string
          readOnly: true
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusC3bEnum'
          readOnly: true
        assigned_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - assigned_at
      - email
      - full_name
      - id
      - role
      - status
      - user_id
    TournamentMembershipUpdate:
      type: object
      description: PATCH body for member management — role and/or status, both optional.
      properties:
        role:
          $ref: '#/components/schemas/RoleEnum'
        status:
          $ref: '#/components/schemas/StatusC3bEnum'
    TransferOwnership:
      type: object
      description: |-
        Accepts either ``new_owner_user_id`` (canonical) or ``to_user_id``
        (frontend alias). At least one must be present.
      properties:
        new_owner_user_id:
          type: string
          format: uuid
        to_user_id:
          type: string
          format: uuid
        reason:
          type: string
          maxLength: 500
        event_id:
          type: string
          format: uuid
        conflict_acknowledged:
          type: boolean
    TwoFAConfirm:
      type: object
      properties:
        code:
          type: string
      required:
      - code
    TwoFAConfirmResponse:
      type: object
      properties:
        recovery_codes:
          type: array
          items:
            type: string
      required:
      - recovery_codes
    TwoFADisable:
      type: object
      properties:
        reason:
          type: string
    TwoFAEnrollResponse:
      type: object
      properties:
        otpauth_uri:
          type: string
        qr_data_uri:
          type: string
        device_id:
          type: string
          format: uuid
      required:
      - device_id
      - otpauth_uri
      - qr_data_uri
    VerifyEmail:
      type: object
      properties:
        token:
          type: string
      required:
      - token
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
