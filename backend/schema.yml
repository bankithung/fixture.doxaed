      responses:
        '200':
          description: No response body
    delete:
      operationId: forms_destroy
      description: '`GET/PATCH/DELETE /api/forms/{id}/` — read, partial-update, soft-delete.'
      parameters:
      - in: path
        name: form_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - forms
      security:
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/forms/{form_id}/contact/:
    post:
      operationId: forms_contact_create
      description: |-
        `POST /api/forms/{id}/contact/` — a public visitor messages the organisers.

        Emails the tournament's active admins/co-organizers (sender set as reply-to)
        so anyone hitting an issue can reach a human. AllowAny + throttled; never
        leaks whether/which organisers exist.
      parameters:
      - in: path
        name: form_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - forms
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/forms/{form_id}/directory/:
    get:
      operationId: forms_directory_retrieve
      description: |-
        `GET /api/forms/{form_id}/directory/` — AllowAny public directory of the
        institutions registered through an org-registration form, with filters
        derived dynamically from the form's own choice fields. Exposes only
        name/region/kind + the choice-field selections (never contact details).
      parameters:
      - in: path
        name: form_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - forms
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/forms/{form_id}/public/:
    get:
      operationId: forms_public_retrieve
      description: |-
        `GET/POST /api/forms/{id}/public/` and `/api/forms/r/{token}/`.

        GET returns the form schema (or ``{"closed": true}`` when not accepting
        submissions); POST validates + records a response. Resolves either by form
        id (open public form) or by an active share token.
      parameters:
      - in: path
        name: form_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - forms
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
    post:
      operationId: forms_public_create
      description: |-
        `GET/POST /api/forms/{id}/public/` and `/api/forms/r/{token}/`.

        GET returns the form schema (or ``{"closed": true}`` when not accepting
        submissions); POST validates + records a response. Resolves either by form
        id (open public form) or by an active share token.
      parameters:
      - in: path
        name: form_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - forms
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/forms/{form_id}/responses/:
    get:
      operationId: forms_responses_retrieve
      description: '`GET /api/forms/{id}/responses/` — list submissions, or `?export=csv`.'
      parameters:
      - in: path
        name: form_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - forms
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/forms/{form_id}/responses/{response_id}/:
    patch:
      operationId: forms_responses_partial_update
      description: '`PATCH /api/forms/{id}/responses/{rid}/` — review status (accept/reject/...).'
      parameters:
      - in: path
        name: form_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: response_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - forms
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/forms/{form_id}/team-access/:
    post:
      operationId: forms_team_access_create
      description: |-
        `POST /api/forms/{form_id}/team-access/` — exchange (institution,
        access code) for a short-lived signed token + the institution's previous
        submission for editing. AllowAny, but: per-IP throttle, per-institution
        failure lockout, constant-time hash check, and the response only carries
        data the code-holder is entitled to (their own previous answers).
      parameters:
      - in: path
        name: form_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - forms
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/forms/{form_id}/uploads/:
    post:
      operationId: forms_uploads_create
      description: |-
        `POST /api/forms/{id}/uploads/` — stage a file before submission.

        Returns an ``upload_ref`` the client later includes in ``upload_refs`` on the
        submission; ``submit_response`` then claims the unattached row. Validates
        size + content type. AllowAny + throttled.
      parameters:
      - in: path
        name: form_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - forms
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/forms/{form_id}:close/:
    post:
      operationId: forms_:close_create
      description: '`POST /api/forms/{id}:close/` — open -> closed.'
      parameters:
      - in: path
        name: form_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - forms
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/forms/{form_id}:copy-from/:
    post:
      operationId: forms_:copy_from_create
      description: |-
        `POST /api/forms/{id}:copy-from/` — replace this form's schema (+ bindings)
        with a built-in template or another accessible form's schema. Manager-only on
        the target; the source must be a template id or a form the user can access.
      parameters:
      - in: path
        name: form_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - forms
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/forms/{form_id}:duplicate/:
    post:
      operationId: forms_:duplicate_create
      description: '`POST /api/forms/{id}:duplicate/` — clone schema into a new draft
        form.'
      parameters:
      - in: path
        name: form_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - forms
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/forms/{form_id}:institution-links/:
    post:
      operationId: forms_:institution_links_create
      description: |-
        `POST /api/forms/{id}:institution-links/` — mint one bound, prefilled
        share-link per registered institution for this (team-registration) form.

        Each link locks the institution and prefills its Stage-1 identity/contact, so
        a school just confirms and adds teams. Idempotent: institutions that already
        have a link are returned without a fresh token (tokens are hashed at rest, so
        only newly-minted ones expose a path).
      parameters:
      - in: path
        name: form_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - forms
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/forms/{form_id}:publish/:
    post:
      operationId: forms_:publish_create
      description: '`POST /api/forms/{id}:publish/` — draft -> open.'
      parameters:
      - in: path
        name: form_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - forms
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/forms/{form_id}:regenerate/:
    post:
      operationId: forms_:regenerate_create
      description: |-
        `POST /api/forms/{id}:regenerate/` — rebuild a GENERATED form's schema
        from the tournament's CURRENT sports/category config (invariant 10: the
        regenerate half of regenerate/keep). Hand-built forms are refused — only
        forms carrying the generator's settings tags can be rebuilt. Bindings,
        structural tags and the staleness fingerprint are refreshed; title,
        status and share links are preserved. Audited via update_form.
      parameters:
      - in: path
        name: form_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - forms
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/forms/{form_id}:send-stage2/:
    post:
      operationId: forms_:send_stage2_create
      description: |-
        `POST /api/forms/{id}:send-stage2/` — mint per-respondent share-links.

        For each *accepted* response on this (stage-1) form, mint a single-use
        share-link against the target ``team_registration`` form so the school can
        submit its roster. Returns the minted links so the UI can display/copy them
        (email enqueue is a follow-up; see plan NOTE on Task 5.2).
      parameters:
      - in: path
        name: form_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - forms
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/forms/copyable/:
    get:
      operationId: forms_copyable_retrieve
      description: |-
        `GET /api/forms/copyable/` — built-in templates + every form the user can
        access (across their tournaments) that has content, for the "copy from" picker.
      tags:
      - forms
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/forms/field-types/:
    get:
      operationId: forms_field_types_retrieve
      description: '`GET /api/forms/field-types/` — the field-type catalog for the
        builder UI.'
      tags:
      - forms
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/forms/r/{token}/:
    get:
      operationId: forms_r_retrieve
      description: |-
        `GET/POST /api/forms/{id}/public/` and `/api/forms/r/{token}/`.

