      description: |-
        DELETE /api/orgs/{slug}/invitations/{invitation_id}/

        Plain DELETE = revoke. Mirrors the AIP-136
        ``{uuid}/invitations/{id}:revoke/`` colon verb but uses the simpler
        REST shape the SPA expects.
