          description: No response body
  /api/feedback/submit/:
    post:
      operationId: feedback_submit_create
      description: Submit feedback from any authenticated user. Body is PII-redacted
        at the service layer (B.11). Throttled to 10/hr/user.
      tags:
      - feedback
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeedbackSubmit'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/FeedbackSubmit'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FeedbackSubmit'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackSubmitResponse'
          description: ''
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackSubmitResponse'
          description: ''
  /api/forms/{form_id}/:
    get:
      operationId: forms_retrieve
      description: '`GET/PATCH/DELETE /api/forms/{id}/` — read, partial-update, soft-delete.'
      parameters:
      - in: path
        name: form_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - forms
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
    patch:
      operationId: forms_partial_update
      description: '`GET/PATCH/DELETE /api/forms/{id}/` — read, partial-update, soft-delete.'
      parameters:
      - in: path
        name: form_id
        schema:
          type: string
          format: uuid
