          description: No response body
  /api/accounts/auth/resend-verification/:
    post:
      operationId: accounts_auth_resend_verification_create
      description: |-
        Re-send the email-verification link for a pending account.

        Enumeration-safe: always returns 202 regardless of whether the email maps
        to a pending account. Only acts for users that exist, aren't deleted, and
        are still unverified — minting a fresh token and invalidating older unused
        ones so a single live link exists at a time.
      tags:
      - accounts
      security:
      - cookieAuth: []
      - {}
      responses:
        '202':
          description: No response body
  /api/accounts/auth/signup/:
    post:
      operationId: accounts_auth_signup_create
      description: |-
        Public Path B signup (v1Users.md §2.3).

        Creates a User + a pending-review Organization + a pending Admin
        membership in one atomic transaction. Path A (invite-accept) is
        handled by ``apps.organizations.views.invitation_accept`` and is
        NOT routed through here — invited users are joining an existing
        Org, not creating one.

        Idempotency: clients may send a UUID ``event_id``; replay returns
        200 (existing record) instead of 201 (newly created), per
        architectural invariant 3.

        Rate limit: ``SignupRateThrottle`` enforces 3/hr/IP per B.11.
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Signup'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Signup'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Signup'
        required: true
      security:
      - cookieAuth: []
      - {}
      responses:
        '201':
          description: Pending account; check email.
