{% extends "emails/base_email.html" %}

{% block title %}{{ title }}{% endblock %}
{% block preheader %}{{ body|truncatechars:120 }}{% endblock %}

{% block content %}
  <h1 style="margin:0 0 16px 0; font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:24px; line-height:32px; font-weight:700; color:#0f172a; letter-spacing:-0.3px;">
    {{ title }}
  </h1>
  {% if body %}
  <p style="margin:0 0 16px 0; font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:15px; line-height:24px; color:#334155;">
    {{ body }}
  </p>
  {% endif %}
  {% if action_url %}
  <p style="margin:0;">
    <a class="btn" href="{{ action_url }}" style="display:inline-block; background:#6840dd; color:#ffffff; font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:15px; font-weight:600; line-height:20px; padding:12px 22px; border-radius:8px; text-decoration:none;">Open in Fixture</a>
  </p>
  {% endif %}
{% endblock %}
