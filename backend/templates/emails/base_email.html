{% load i18n %}<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <title>{% block title %}Fixture Platform{% endblock %}</title>
  <!--[if mso]><style>* { font-family: Arial, Helvetica, sans-serif !important; }</style><![endif]-->
  <style>
    /* Client resets */
    body,table,td,a{ -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%; }
    table,td{ mso-table-lspace:0pt; mso-table-rspace:0pt; }
    img{ -ms-interpolation-mode:bicubic; border:0; height:auto; line-height:100%; outline:none; text-decoration:none; }
    body{ margin:0; padding:0; width:100% !important; height:100% !important; background:#f3f2f8; }
    a{ color:#6840dd; }
    .btn:hover{ background:#5836c4 !important; }
    @media only screen and (max-width:600px){
      .container{ width:100% !important; }
      .px{ padding-left:24px !important; padding-right:24px !important; }
    }
  </style>
</head>
<body style="margin:0; padding:0; background:#f3f2f8;">
  <!-- preheader (hidden in inbox preview) -->
  <div style="display:none; max-height:0; overflow:hidden; opacity:0; mso-hide:all;">
    {% block preheader %}{% endblock %}
  </div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#f3f2f8" style="background:#f3f2f8;">
    <tr>
      <td align="center" style="padding:32px 16px;">

        <table role="presentation" class="container" width="600" cellpadding="0" cellspacing="0" border="0" style="width:600px; max-width:600px;">

          <!-- Brand header: the real logo mark + wordmark. -->
          <tr>
            <td style="padding:0 4px 18px 4px;" align="left">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="vertical-align:middle;">
                    <img src="https://fixture.doxaed.com/brand-logo.jpg" width="34" height="34" alt="Fixture" style="display:block; width:34px; height:34px; border-radius:9px;">
                  </td>
                  <td style="vertical-align:middle; padding-left:10px;">
                    <span style="font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:18px; font-weight:600; color:#181433; letter-spacing:-0.2px;">Fixture</span>
                  </td>
                  <td style="vertical-align:middle; padding-left:8px;">
                    <span style="font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:12px; color:#8b86a3;">fixture.doxaed.com</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Card: brand-violet crown bar over a clean white body. -->
          <tr>
            <td style="border-radius:16px 16px 0 0; background:#6840dd; height:5px; line-height:5px; font-size:5px;">&nbsp;</td>
          </tr>
          <tr>
            <td class="px" style="background:#ffffff; border:1px solid #e5e2f2; border-top:0; border-radius:0 0 16px 16px; padding:36px 40px 40px 40px; box-shadow:0 1px 3px rgba(24,20,51,0.06);">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:24px 8px 0 8px;" align="center">
              <p style="margin:0 0 6px 0; font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:12px; line-height:18px; color:#6f6a87;">
                Fixture — sports fixture &amp; tournament management
              </p>
              <p style="margin:0; font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:12px; line-height:18px; color:#8b86a3;">
                This is an automated message from <a href="https://fixture.doxaed.com" style="color:#6f6a87; text-decoration:underline;">fixture.doxaed.com</a> — please don't reply.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
