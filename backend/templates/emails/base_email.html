{% load i18n %}<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <title>{% block title %}Fixture Platform{% endblock %}</title>
  <!--[if mso]><style>* { font-family: Arial, Helvetica, sans-serif !important; }</style><![endif]-->
  <style>
    /* Client resets */
    body,table,td,a{ -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%; }
    table,td{ mso-table-lspace:0pt; mso-table-rspace:0pt; }
    img{ -ms-interpolation-mode:bicubic; border:0; height:auto; line-height:100%; outline:none; text-decoration:none; }
    body{ margin:0; padding:0; width:100% !important; height:100% !important; background:#f1f5f4; }
    a{ color:#0c8d62; }
    .btn:hover{ background:#0a7a55 !important; }
    @media only screen and (max-width:600px){
      .container{ width:100% !important; }
      .px{ padding-left:24px !important; padding-right:24px !important; }
    }
  </style>
</head>
<body style="margin:0; padding:0; background:#f1f5f4;">
  <!-- preheader (hidden in inbox preview) -->
  <div style="display:none; max-height:0; overflow:hidden; opacity:0; mso-hide:all;">
    {% block preheader %}{% endblock %}
  </div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#f1f5f4" style="background:#f1f5f4;">
    <tr>
      <td align="center" style="padding:32px 16px;">

        <table role="presentation" class="container" width="600" cellpadding="0" cellspacing="0" border="0" style="width:600px; max-width:600px;">

          <!-- Brand header -->
          <tr>
            <td style="padding:0 0 20px 0;" align="left">
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="vertical-align:middle;">
                    <span style="display:inline-block; width:32px; height:32px; border-radius:8px; background:#0c8d62; color:#ffffff; font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-weight:700; font-size:18px; line-height:32px; text-align:center; vertical-align:middle;">F</span>
                  </td>
                  <td style="vertical-align:middle; padding-left:10px;">
                    <span style="font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:18px; font-weight:700; color:#0f172a; letter-spacing:-0.2px;">Fixture</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td class="px" style="background:#ffffff; border:1px solid #e2e8f0; border-radius:16px; padding:40px; box-shadow:0 1px 2px rgba(15,23,42,0.04);">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:24px 8px 0 8px;" align="center">
              <p style="margin:0 0 6px 0; font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:12px; line-height:18px; color:#64748b;">
                Fixture Platform — sports fixture &amp; tournament management
              </p>
              <p style="margin:0; font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:12px; line-height:18px; color:#94a3b8;">
                This is an automated message from <a href="https://fixture.doxaed.com" style="color:#64748b; text-decoration:underline;">fixture.doxaed.com</a> — please don't reply.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
