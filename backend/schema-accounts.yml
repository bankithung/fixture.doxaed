          description: ''
components:
  schemas:
    AcceptInvitation:
      type: object
      properties:
        token:
          type: string
          maxLength: 128
      required:
      - token
    AdminInvitation:
      type: object
      description: |-
        Read-side serializer. Surfaces effective_status (computed) which
        flips pending→expired when expires_at is in the past, even if the
        DB row hasn't been swept yet (we don't run a cron — read-time
        materialization).
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        organization:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/AdminInvitationStatusEnum'
          readOnly: true
          default: pending
        effective_status:
          type: string
          readOnly: true
        expires_at:
          type: string
          format: date-time
          readOnly: true
        accepted_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        revoked_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        invited_by:
          type: string
          format: uuid
          readOnly: true
          nullable: true
      required:
      - accepted_at
      - created_at
      - effective_status
      - email
      - expires_at
      - id
      - invited_by
      - organization
      - revoked_at
      - role
      - status
    AdminInvitationCreate:
      type: object
      properties:
        email:
          type: string
          format: email
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          default: co_organizer
      required:
      - email
    AdminInvitationStatusEnum:
      enum:
      - pending
      - accepted
      - expired
      - revoked
      type: string
      description: |-
        * `pending` - Pending
        * `accepted` - Accepted
        * `expired` - Expired
        * `revoked` - Revoked
    Archive:
      type: object
      properties:
        reason:
          type: string
          maxLength: 500
      required:
      - reason
    BulkGrants:
      type: object
      description: PUT body for /grants/ — replace all grants atomically.
      properties:
        grants:
          type: array
          items:
            $ref: '#/components/schemas/GrantInput'
        reason:
          type: string
          maxLength: 2000
          minLength: 20
      required:
      - grants
      - reason
    ChangeSlug:
      type: object
      properties:
        new_slug:
          type: string
          maxLength: 63
      required:
      - new_slug
    EffectiveModules:
      type: object
      description: Response shape for GET /me/modules/.
      properties:
        modules:
          type: array
          items:
            type: string
      required:
      - modules
    GrantInput:
      type: object
      description: Single (module, state) pair used inside the bulk grants PUT body.
      properties:
        module:
          type: string
          maxLength: 64
        state:
          $ref: '#/components/schemas/StateEnum'
      required:
      - module
      - state
    GrantRow:
      type: object
      description: A single MembershipModuleGrant row, with module code denormalized.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        module_code:
          type: string
          readOnly: true
        state:
          allOf:
          - $ref: '#/components/schemas/StateEnum'
          readOnly: true
        reason:
          type: string
          readOnly: true
        granted_by:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - granted_by
      - id
      - module_code
      - reason
      - state
      - updated_at
    Login:
      type: object
      properties:
        email:
          type: string
