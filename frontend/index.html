<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/brand-logo.jpg?v=2" />
    <link rel="apple-touch-icon" href="/brand-logo.jpg?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DoxaEd Fixtures</title>
    <!-- Inter is self-hosted via @fontsource/inter (imported in main.tsx); no
         Google Fonts CDN dependency at runtime. -->
    <script>
      // FOUC guard: apply persisted/system theme before React hydrates.
      (function () {
        try {
          var t = localStorage.getItem("fixture.theme") || "system";
          var dark =
            t === "dark" ||
            (t === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
