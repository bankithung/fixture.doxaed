<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fixture · Live scores, schedules and brackets</title>
    <meta name="description" content="Follow school tournaments live: scores, schedules, standings and knockout brackets." />
    <meta property="og:title" content="Fixture · Live scores, schedules and brackets" />
    <meta property="og:description" content="Follow school tournaments live: scores, schedules, standings and knockout brackets." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="theme-color" content="#6840dd" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Inter is self-hosted via @fontsource/inter (imported in main.tsx); no
         Google Fonts CDN dependency at runtime. -->
    <script>
      // FOUC guard: apply persisted/system theme before React hydrates.
      (function () {
        try {
          var t = localStorage.getItem("fixture.theme") || "system";
          var dark =
            t === "dark" ||
            (t === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
