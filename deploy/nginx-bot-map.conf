# Fixture: link-preview bot detection (http-level map; P6 reach).
# Install to /etc/nginx/conf.d/fixture-bot-map.conf. Known unfurl crawlers
# get server-rendered OG meta for /m/:id instead of the blank SPA shell,
# so a forwarded match link SHOWS the score in WhatsApp/Telegram/etc.
map $http_user_agent $fixture_is_bot {
    default                       0;
    "~*whatsapp"                  1;
    "~*facebookexternalhit"       1;
    "~*twitterbot"                1;
    "~*telegrambot"               1;
    "~*slackbot"                  1;
    "~*linkedinbot"               1;
    "~*discordbot"                1;
    "~*pinterest"                 1;
    "~*googlebot"                 1;
}
