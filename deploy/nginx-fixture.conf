# Fixture Platform — nginx reverse proxy + SPA host.
# Serves the built React SPA, proxies /api /sadmin /ws to the ASGI app,
# and serves Django static/media directly. TLS terminates here; the
# X-Forwarded-Proto header lets Django enforce SECURE_SSL_REDIRECT/HSTS.

upstream fixture_asgi {
    server unix:/run/fixture/gunicorn.sock;
}

# --- HTTP -> HTTPS redirect ------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name 16.112.66.154 fixture.doxaed.com _;
    return 301 https://$host$request_uri;
}

# --- HTTPS -----------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name 16.112.66.154 fixture.doxaed.com _;

    ssl_certificate     /etc/ssl/fixture/fixture.crt;
    ssl_certificate_key /etc/ssl/fixture/fixture.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # SPA build output.
    root /home/ubuntu/Fixture/frontend/dist;
    index index.html;

    client_max_body_size 25m;

    # Django-collected static (sadmin console, DRF/Swagger UI assets).
    location /static/ {
        alias /home/ubuntu/Fixture/backend/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Form uploads carry registrant PII (rosters, ID documents); they are
    # served ONLY through the token/manager-gated API (forms ServeUploadView),
    # never straight off disk.
    location /media/form_uploads/ {
        return 404;
    }

    # User-uploaded media (public assets only, e.g. crests/share cards).
    location /media/ {
        alias /home/ubuntu/Fixture/backend/media/;
        access_log off;
        expires 7d;
    }

    # WebSocket (Channels) — scorer/referee live rooms.
    location /ws/ {
        proxy_pass http://fixture_asgi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API + Super-admin console -> ASGI app.
    location ~ ^/(api|sadmin)/ {
        proxy_pass http://fixture_asgi;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        # let SSE stream (notification bell + the public tournament tick
        # stream at /api/public/tournaments/<slug>/<id>/stream/; the view
        # also sends X-Accel-Buffering: no as belt-and-braces)
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # Hashed SPA assets — long cache.
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Shared match links: preview bots get server-rendered OG meta with the
    # score card; humans get the SPA (P6 reach). $fixture_is_bot comes from
    # conf.d/fixture-bot-map.conf (deploy/nginx-bot-map.conf).
    location ~ "^/m/(?<fixture_mid>[0-9a-fA-F-]{36})/?$" {
        if ($fixture_is_bot) {
            rewrite ^ /api/live/match-meta/$fixture_mid/ last;
        }
        try_files /index.html =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # SPA client-side routing fallback. index.html must NEVER be cached:
    # it names the hashed bundle, and a stale shell pins users to old JS.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
