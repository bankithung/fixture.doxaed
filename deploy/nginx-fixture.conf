# Fixture Platform — nginx reverse proxy + SPA host.
# Serves the built React SPA, proxies /api /sadmin /ws to the ASGI app,
# and serves Django static/media directly. TLS terminates here; the
# X-Forwarded-Proto header lets Django enforce SECURE_SSL_REDIRECT/HSTS.

upstream fixture_asgi {
    server unix:/run/fixture/gunicorn.sock;
}

# --- HTTP -> HTTPS redirect ------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name 16.112.66.154 fixture.doxaed.com _;
    return 301 https://$host$request_uri;
}

# --- HTTPS -----------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name 16.112.66.154 fixture.doxaed.com _;

    ssl_certificate     /etc/ssl/fixture/fixture.crt;
    ssl_certificate_key /etc/ssl/fixture/fixture.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # SPA build output.
    root /home/ubuntu/Fixture/frontend/dist;
    index index.html;

    client_max_body_size 25m;

    # Django-collected static (sadmin console, DRF/Swagger UI assets).
    location /static/ {
        alias /home/ubuntu/Fixture/backend/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # User-uploaded media.
    location /media/ {
        alias /home/ubuntu/Fixture/backend/media/;
        access_log off;
        expires 7d;
    }

    # WebSocket (Channels) — scorer/referee live rooms.
    location /ws/ {
        proxy_pass http://fixture_asgi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API + Super-admin console -> ASGI app.
    location ~ ^/(api|sadmin)/ {
        proxy_pass http://fixture_asgi;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;          # let SSE (notification bell) stream
        proxy_read_timeout 3600s;
    }

    # Hashed SPA assets — long cache.
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA client-side routing fallback. index.html must NEVER be cached:
    # it names the hashed bundle, and a stale shell pins users to old JS.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
